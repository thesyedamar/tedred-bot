<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TedRed Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #0d0d0f;
  min-height: 100vh;
}

#tr-launcher {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 56px;
  height: 56px;
  background: #dc2626;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 24px rgba(220,38,38,0.45);
  z-index: 9999;
  transition: transform 0.2s;
}
#tr-launcher:hover { transform: scale(1.08); }

#tr-window {
  position: fixed;
  bottom: 96px;
  right: 28px;
  width: 360px;
  height: 500px;
  background: #111114;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.08);
  display: none;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  z-index: 9998;
}
#tr-window.open { display: flex; }

.tr-header {
  padding: 16px 20px;
  background: #1a1a1e;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.tr-avatar {
  width: 36px;
  height: 36px;
  background: #dc2626;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 600;
  font-size: 13px;
  flex-shrink: 0;
}
.tr-header-name { font-size: 14px; font-weight: 600; color: #f1f1f1; }
.tr-header-status { font-size: 11px; color: rgba(255,255,255,0.35); display: flex; align-items: center; gap: 4px; margin-top: 2px; }
.tr-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }

#tr-messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
#tr-messages::-webkit-scrollbar { width: 3px; }
#tr-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

.msg { max-width: 80%; }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; }

.bubble {
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 13.5px;
  line-height: 1.5;
  word-break: break-word;
}
.msg.bot .bubble {
  background: #1c1c22;
  color: #e2e2e8;
  border-bottom-left-radius: 4px;
  border: 1px solid rgba(255,255,255,0.06);
}
.msg.user .bubble {
  background: #dc2626;
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg-time {
  font-size: 10px;
  color: rgba(255,255,255,0.2);
  margin-top: 4px;
  padding: 0 2px;
}
.msg.user .msg-time { text-align: right; }

.typing-bubble {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  background: #1c1c22;
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  border: 1px solid rgba(255,255,255,0.06);
  width: fit-content;
}
.typing-bubble span {
  width: 6px; height: 6px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  animation: tdot 1.2s infinite;
}
.typing-bubble span:nth-child(2) { animation-delay: 0.15s; }
.typing-bubble span:nth-child(3) { animation-delay: 0.3s; }
@keyframes tdot {
  0%,80%,100% { transform: translateY(0); }
  40% { transform: translateY(-5px); }
}

#tr-qr { padding: 0 14px 8px; display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0; }
.qr-btn {
  background: transparent;
  border: 1px solid rgba(220,38,38,0.4);
  border-radius: 20px;
  color: #dc2626;
  font-size: 12px;
  font-family: inherit;
  padding: 5px 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.qr-btn:hover { background: rgba(220,38,38,0.1); }

.tr-input-area {
  padding: 10px 12px 12px;
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  flex-shrink: 0;
}
#tr-input {
  flex: 1;
  background: #1c1c22;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 10px 14px;
  color: #f1f1f1;
  font-size: 13.5px;
  font-family: inherit;
  resize: none;
  outline: none;
  line-height: 1.4;
  max-height: 90px;
  transition: border-color 0.15s;
}
#tr-input::placeholder { color: rgba(255,255,255,0.2); }
#tr-input:focus { border-color: rgba(220,38,38,0.5); }

#tr-send {
  width: 38px;
  height: 38px;
  background: #dc2626;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, transform 0.1s;
}
#tr-send:hover { background: #b91c1c; }
#tr-send:active { transform: scale(0.92); }
#tr-send:disabled { background: #2a2a30; cursor: not-allowed; }

.tr-footer {
  text-align: center;
  font-size: 10px;
  color: rgba(255,255,255,0.1);
  padding: 0 0 10px;
  flex-shrink: 0;
}
</style>
</head>
<body>

<script>
window.TedRedConfig = {
  API_URL: "https://tedred-bot.onrender.com/",
  BOT_NAME: "TedRed Assistant",
  GREETING: "Hi there! Welcome to TedRed. I am here to help you explore our business solutions. What brings you here today?"
};
</script>

<button id="tr-launcher" onclick="trToggle()">
  <svg id="icon-chat" width="22" height="22" viewBox="0 0 24 24" fill="none"
    stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <svg id="icon-close" width="20" height="20" viewBox="0 0 24 24" fill="none"
    stroke="#fff" stroke-width="2.5" stroke-linecap="round" style="display:none">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</button>

<div id="tr-window">
  <div class="tr-header">
    <div class="tr-avatar">TR</div>
    <div>
      <div class="tr-header-name" id="tr-bot-name">TedRed Assistant</div>
      <div class="tr-header-status">
        <span class="tr-dot"></span> Online · Replies instantly
      </div>
    </div>
  </div>

  <div id="tr-messages"></div>
  <div id="tr-qr"></div>

  <div class="tr-input-area">
    <textarea id="tr-input" rows="1" placeholder="Type a message..."
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,90)+'px'"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();trSend()}"
    ></textarea>
    <button id="tr-send" onclick="trSend()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="tr-footer">powered by TedRed AI</div>
</div>

<script>
(function () {
  var cfg       = window.TedRedConfig;
  var sessionId = 'tr_' + Math.random().toString(36).slice(2) + Date.now();
  var isOpen    = false;
  var busy      = false;

  var win       = document.getElementById('tr-window');
  var msgs      = document.getElementById('tr-messages');
  var qrBox     = document.getElementById('tr-qr');
  var inp       = document.getElementById('tr-input');
  var sendBtn   = document.getElementById('tr-send');
  var iconChat  = document.getElementById('icon-chat');
  var iconClose = document.getElementById('icon-close');

  document.getElementById('tr-bot-name').textContent = cfg.BOT_NAME;

  var QR = ["What services do you offer?", "I need a quote", "Talk to a human"];

  function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addMsg(role, text) {
    var wrap   = document.createElement('div');
    wrap.className = 'msg ' + role;
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    var time   = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = now();
    wrap.appendChild(bubble);
    wrap.appendChild(time);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showQR() {
    qrBox.innerHTML = '';
    QR.forEach(function(q) {
      var b = document.createElement('button');
      b.className = 'qr-btn';
      b.textContent = q;
      b.onclick = function() { qrBox.innerHTML = ''; doSend(q); };
      qrBox.appendChild(b);
    });
  }

  function showTyping() {
    var d = document.createElement('div');
    d.id = 'typing';
    d.className = 'msg bot';
    d.innerHTML = '<div class="typing-bubble"><span></span><span></span><span></span></div>';
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideTyping() {
    var t = document.getElementById('typing');
    if (t) t.remove();
  }

  function doSend(text) {
    if (!text || busy) return;
    busy = true;
    sendBtn.disabled = true;
    qrBox.innerHTML  = '';
    addMsg('user', text);
    showTyping();

    fetch(cfg.API_URL + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message: text })
    })
    .then(function(res) {
      return res.json();
    })
    .then(function(data) {
      hideTyping();
      addMsg('bot', data.reply);
    })
    .catch(function(err) {
      console.error('Widget error:', err);
      hideTyping();
      addMsg('bot', 'Sorry, connection error. Please try again.');
    })
    .finally(function() {
      busy = false;
      sendBtn.disabled = false;
    });
  }

  function trSend() {
    var text = inp.value.trim();
    if (!text) return;
    inp.value = '';
    inp.style.height = 'auto';
    doSend(text);
  }
  window.trSend = trSend;

  function trToggle() {
    isOpen = !isOpen;
    if (isOpen) {
      win.classList.add('open');
      iconChat.style.display  = 'none';
      iconClose.style.display = 'block';
      if (msgs.children.length === 0) {
        setTimeout(function() {
          addMsg('bot', cfg.GREETING);
          showQR();
        }, 300);
      }
    } else {
      win.classList.remove('open');
      iconChat.style.display  = 'block';
      iconClose.style.display = 'none';
    }
  }
  window.trToggle = trToggle;

})();
</script>

</body>
</html>
